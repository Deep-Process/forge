# Development overrides — hot-reload for backend and frontend
# This file is auto-loaded by `docker compose up` alongside docker-compose.yml
services:
  forge-api:
    volumes:
      - ./forge-api/app:/app/app
      - ./config:/config:ro
      - forge-data:/data
      - ./core:/app/core:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      FORGE_DEBUG: "true"

  forge-web:
    build:
      context: ./forge-web
      target: deps
    volumes:
      - ./forge-web:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev
    environment:
      NEXT_PUBLIC_API_URL: /api/v1
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
      FORGE_API_INTERNAL_URL: http://forge-api:8000
      NEXT_TELEMETRY_DISABLED: "1"
      WATCHPACK_POLLING: "true"
